<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body, .wrap { margin:0; }
  .wrap {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #111;
    color: #eee;
    padding: 12px;
    max-width: 480px;
    margin: 0 auto;
  }
  .photo-stage {
    position: relative;
    width: 100%;
    aspect-ratio: 3/2;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .photo-stage img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform-origin: center;
  }
  .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .vignette {
    position:absolute; inset:0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
  }
  .readout {
    display:flex;
    justify-content: space-between;
    font-size: 12px;
    margin: 10px 2px 4px;
    color: #9fd6a3;
    font-variant-numeric: tabular-nums;
  }
  .exposure-bar {
    height: 6px;
    border-radius: 4px;
    background: #333;
    margin: 0 2px 16px;
    overflow: hidden;
    position: relative;
  }
  .exposure-fill {
    position:absolute;
    top:0; bottom:0;
    transition: left 0.15s ease, width 0.15s ease;
  }
  .control { margin: 14px 2px 18px; }
  .control label {
    display:flex;
    justify-content: space-between;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .control .val { color: #6bd0ff; font-weight: 700; }
  .control .desc { font-size: 11px; color: #999; margin-top: 4px; }
  input[type=range] {
    width: 100%;
    height: 36px;
    -webkit-appearance: none;
    background: transparent;
    touch-action: none;
  }
  input[type=range]::-webkit-slider-runnable-track { height: 4px; background: #444; border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px; height: 26px;
    margin-top: -11px;
    border-radius: 50%;
    background: #6bd0ff;
    border: 3px solid #111;
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  input[type=range]::-moz-range-track { height: 4px; background: #444; border-radius: 2px; }
  input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #6bd0ff; border: 3px solid #111; }
  .title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888;
    text-align: center;
    margin-bottom: 10px;
  }
  .reset {
    display:block;
    margin: 6px auto 0;
    background: #222;
    color: #aaa;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
  }
  .hint {
    font-size: 11px;
    color: #6bd0ff;
    text-align: center;
    margin-top: 2px;
    min-height: 14px;
  }
</style>

  const isoLabel = document.getElementById('isoLabel');
  const ssLabel = document.getElementById('ssLabel');
  const expFill = document.getElementById('expFill');
  const vignette = document.getElementById('vignette');
  const canvas = document.getElementById('noiseCanvas');
  const ctx = canvas.getContext('2d');
  const hint = document.getElementById('hint');

  // Each array is spaced by exactly one full EV stop -> index step = 1 stop.
  const fstops = [1.4, 2, 2.8, 4, 5.6, 8, 11, 16, 22];           // index 0 = most light (open)
  const isoValues = [100, 200, 400, 800, 1600, 3200, 6400, 12800]; // index 0 = least light
  const shutterDenoms = [4, 8, 15, 30, 60, 125, 250, 500, 1000, 2000, 4000]; // index 0 = most light (slow)

  const DEFAULT_AP = 5, DEFAULT_ISO = 2, DEFAULT_SS = 6;
  let targetEV = null; // baseline brightness we try to preserve

  function evContribution(){
    // brightness stops: -apIndex (closing aperture loses light) + isoIndex (higher iso = more light) - ssIndex (faster shutter = less light)
    const apIdx = parseInt(apS.value);
    const isoIdx = parseInt(isoS.value);
    const ssIdx = parseInt(ssS.value);
    return (-apIdx) + isoIdx + (-ssIdx);
  }

  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

  function setupNoise(){
    function resize(){
      canvas.width = photo.clientWidth;
      canvas.height = photo.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);
  }

  function drawNoise(amount){
    const w = canvas.width, h = canvas.height;
    if(w===0||h===0) return;
    const imgData = ctx.createImageData(w,h);
    const buf = imgData.data;
    for(let i=0;i<buf.length;i+=4){
      const n = (Math.random()-0.5) * amount * 255;
      buf[i] = 128+n; buf[i+1] = 128+n; buf[i+2] = 128+n; buf[i+3] = 255;
    }
    ctx.putImageData(imgData,0,0);
  }

  // compensation: when one slider changes by `delta` index steps, shift partner sliders
  // by the correct sign/amount so total exposure (EV) stays constant.
  // EV model: EV = -apIdx + isoIdx - ssIdx  (closing aperture or speeding shutter loses light; raising ISO gains light)
  function compensate(source, delta){
    if (delta === 0) return;

    if (source === 'aperture') {
      // closing aperture (delta>0) must SLOW DOWN shutter (decrease ssIdx) to keep same light
      const ssIdx = parseInt(ssS.value);
      const newSsIdx = clamp(ssIdx - delta, 0, shutterDenoms.length-1);
      const absorbed = ssIdx - newSsIdx; // how much was actually absorbed by shutter
      ssS.value = newSsIdx;
      const leftover = delta - absorbed;
      if (Math.abs(leftover) > 0.001) {
        const isoIdx = parseInt(isoS.value);
        isoS.value = clamp(isoIdx + leftover, 0, isoValues.length-1);
      }
    } else if (source === 'shutter') {
      // speeding up shutter (delta>0) must OPEN aperture (decrease apIdx) to keep same light
      const apIdx = parseInt(apS.value);
      const newApIdx = clamp(apIdx - delta, 0, fstops.length-1);
      const absorbed = apIdx - newApIdx;
      apS.value = newApIdx;
      const leftover = delta - absorbed;
      if (Math.abs(leftover) > 0.001) {
        const isoIdx = parseInt(isoS.value);
        isoS.value = clamp(isoIdx + leftover, 0, isoValues.length-1);
      }
    } else if (source === 'iso') {
      // raising ISO (delta>0) gains light, so shutter must speed up (increase ssIdx) to keep same light
      const ssIdx = parseInt(ssS.value);
      const newSsIdx = clamp(ssIdx + delta, 0, shutterDenoms.length-1);
      const absorbed = newSsIdx - ssIdx;
      ssS.value = newSsIdx;
      const leftover = delta - absorbed;
      if (Math.abs(leftover) > 0.001) {
        const apIdx = parseInt(apS.value);
        apS.value = clamp(apIdx + leftover, 0, fstops.length-1);
      }
    }
  }

  function render(){
    const apIdx = parseInt(apS.value);
    const isoIdx = parseInt(isoS.value);
    const ssIdx = parseInt(ssS.value);

    const fNum = fstops[apIdx];
    const iso = isoValues[isoIdx];
    const denom = shutterDenoms[ssIdx];

    apVal.textContent = fNum;
    apLabel.textContent = 'f/' + fNum;
    isoVal.textContent = iso;
    isoLabel.textContent = iso;
    ssVal.textContent = denom;
    ssLabel.textContent = '1/' + denom + 's';

    const currentEV = evContribution();
    const diff = targetEV === null ? 0 : (currentEV - targetEV);
    const brightness = clamp(Math.pow(2, diff*0.12), 0.55, 1.6);

    // depth of field blur ONLY from aperture (open = more background blur feel)
    // we approximate with a very light overall blur, capped low so the subject never looks unusable
    const openness = (fstops.length - 1 - apIdx); // 0 = closed, 8 = wide open
    const apertureBlurPx = (openness * 0.10).toFixed(2);

    // noise ONLY from ISO
    const noiseAmount = Math.max(0, (isoIdx - 2) / (isoValues.length-1) * 0.35);

    photo.style.filter =
      'brightness(' + brightness.toFixed(2) + ') ' +
      'blur(' + apertureBlurPx + 'px) ' +
      'saturate(' + (1 + (apIdx<=1?0.12:0)).toFixed(2) + ')';

    vignette.style.opacity = apIdx <= 1 ? 0.85 : 0.25;

    canvas.style.opacity = noiseAmount > 0.02 ? Math.min(0.45, noiseAmount) : 0;
    if(noiseAmount > 0.02){ drawNoise(noiseAmount); }

    // exposure bar (visual only, baseline always centered since we auto-compensate)
    const expPct = clamp(50 + diff*6, 0, 100);
    let fillColor = '#6bff95';
    if (expPct < 40 || expPct > 60) fillColor = '#ffd93d';
    if (expPct < 25 || expPct > 75) fillColor = '#ff6b6b';
    expFill.style.left = '0%';
    expFill.style.width = expPct + '%';
    expFill.style.background = fillColor;

    // hints
    if (apIdx <= 1) {
      hint.textContent = 'Apertura muy abierta: más bokeh, foco más selectivo';
    } else if (isoIdx >= 5) {
      hint.textContent = 'ISO alto: aparece ruido digital visible';
    } else if (ssIdx <= 1) {
      hint.textContent = 'Velocidad lenta: en una foto real esto generaría movimiento borroso';
    } else {
      hint.textContent = '\u00a0';
    }
  }

  function handleChange(source){
    return function(e){
      const el = e.target;
      const newVal = parseInt(el.value);
      const prevVal = parseInt(el.dataset.prev || newVal);
      const delta = newVal - prevVal; // raw index movement, sign handled inside compensate()
      el.dataset.prev = newVal;
      compensate(source, delta);
      // sync prev for the sliders we just changed programmatically
      apS.dataset.prev = apS.value;
      isoS.dataset.prev = isoS.value;
      ssS.dataset.prev = ssS.value;
      render();
    };
  }

  apS.dataset.prev = apS.value;
  isoS.dataset.prev = isoS.value;
  ssS.dataset.prev = ssS.value;

  apS.addEventListener('input', handleChange('aperture'));
  isoS.addEventListener('input', handleChange('iso'));
  ssS.addEventListener('input', handleChange('shutter'));

  document.getElementById('resetBtn').addEventListener('click', function(){
    apS.value = DEFAULT_AP; isoS.value = DEFAULT_ISO; ssS.value = DEFAULT_SS;
    apS.dataset.prev = DEFAULT_AP; isoS.dataset.prev = DEFAULT_ISO; ssS.dataset.prev = DEFAULT_SS;
    render();
  });

  setupNoise();
  photo.addEventListener('load', function(){
    targetEV = evContribution();
    render();
  });
  if (photo.complete) {
    targetEV = evContribution();
    render();
  }
})();
</script>
